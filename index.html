  <body>
    <div id="root">
      <!-- Branded splash screen visible until React mounts -->
      <div id="app-splash" style="
        position: fixed; inset: 0; z-index: 9999;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        background: #0a1410; color: #22c55e;
        font-family: system-ui, -apple-system, sans-serif;
        transition: opacity 0.3s ease;
      ">
        <div style="font-size: 28px; font-weight: 900; letter-spacing: 2px; margin-bottom: 12px;">TICKET AI</div>
        <div style="width: 32px; height: 32px; border: 3px solid rgba(34,197,94,0.2); border-top-color: #22c55e; border-radius: 50%; animation: spin 0.8s linear infinite;"></div>
        <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Remove splash once React renders
      const observer = new MutationObserver(() => {
        const splash = document.getElementById('app-splash');
        if (splash && document.querySelector('#root > *:not(#app-splash)')) {
          splash.style.opacity = '0';
          setTimeout(() => splash.remove(), 300);
          observer.disconnect();
        }
      });
      observer.observe(document.getElementById('root'), { childList: true });
    </script>
  </body>
